<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/styles.css" />
    <title>Client service portal</title>
  </head>
  <body data-role="client">
    <nav>
      <ul>
        <li><a href="./index-client.html">Home</a></li>
        <li><a href="./add-request.html">New Request</a></li>
        <li><a href="./request-detail.html">Requests details</a></li>
        <li><button type="button" id="logoutButton">Log out</button></li>
      </ul>
    </nav>
    <div class="body-content">
      <h2>Request List</h2>
      <form action="" method="get" id="filterForm">
        <label for="filter">Filter by status</label>
        <select id="filterInput" name="filter">
          <option value="all">All</option>
          <option value="Open">Open</option>
          <option value="In_Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
        <button type="submit">Go</button>
      </form>
      <table border="1">
        <tr>
          <th>Title</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Creation Date</th>
          <th>Details</th>
        </tr>
      </table>
      <a href="./add-request.html">New Request</a>
    </div>

    <script src="../data/data.js"></script>
    <script src="../script/storage.js"></script>
    <script src="../script/app.js"></script>
  </body>
</html>
