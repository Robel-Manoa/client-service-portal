<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
    <title>Client service portal</title>
</head>
<body>
    <h2>Add new request</h2>
    <form action="" method="post">
        <input type="text" id="id-client" hidden>
        <label for="title">Title</label>
        <input type="text" name="title" required>
        <select name="priority" required>
            <option value="">Select priority</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
        <label for="description">Description</label>
        <textarea name="description" id="description" placeholder="Enter request description"></textarea>
        <input type="date" name="created_at" id="created_at" hidden value="today()">
        <button type="submit">Submit</button>
    </form>
</body>
</html>
