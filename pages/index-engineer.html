<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/styles.css" />
    <title>Client Service Portal</title>
  </head>
  <body>
    <h1>Hello engineer</h1>
    <nav>
      <ul>
        <li><a href="./index-engineer.html">Home</a></li>
        <li><a href="./request-detail.html">Requests details</a></li>
        <li><button type="button" id="logoutButton">Log out</button></li>
      </ul>
    </nav>

    <h2>Request List</h2>
    <form action="" method="get" id="filterForm">
        <label for="filter">Filter by status</label>
        <select id="filterInput" name="filter">
            <option value="all">All</option>
            <option value="Open">Open</option>
            <option value="In_Progress">In Progress</option>
            <option value="Closed">Closed</option>
        </select>
        <button type="submit">Go</button>
    </form>

    <table border="1">
        <tr>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Creation Date</th>
            <th>Details</th>
        </tr>
    </table>

    <script src="../data/data.js"></script>
    <script src="../script/app.js"></script>
  </body>
</html>
