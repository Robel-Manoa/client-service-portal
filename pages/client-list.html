<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/styles.css" />
    <title>Client Service Portal</title>
    <script src="../data/data.js" defer></script>
    <script src="../script/storage.js" defer></script>
    <script src="../script/app.js" defer></script>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="./index-admin.html" id="homeLink">Home</a></li>
        <li><a href="./client-list.html">User List</a></li>
        <li><button type="button" id="logoutButton">Log out</button></li>
      </ul>
    </nav>

    <main class="body-content">
      <h2>
        All Users <button onclick="showForm()" id="add-btn">Add user</button>
      </h2>
      <div id="clients-list"></div>

      <template id="user-row-template">
        <ul>
          <li data-field="name"></li>
          <li data-field="email"></li>
          <li class="role-badge" data-field="role"></li>
          <li><a data-field="link">View details</a></li>
        </ul>
      </template>

      <div id="admin-actions">
        <h2>Add user</h2>
        <form action="" method="post" id="add-user-form">
          <label class="visually-hidden" for="add-user-name">Name</label>
          <input
            type="text"
            name="name"
            id="add-user-name"
            required
            placeholder="Enter the name"
          />

          <label class="visually-hidden" for="add-user-email">Email</label>
          <input
            type="email"
            name="email"
            id="add-user-email"
            required
            placeholder="Enter the email adress"
          />

          <label class="visually-hidden" for="add-user-password"
            >Password</label
          >
          <input
            type="password"
            name="password"
            id="add-user-password"
            required
            placeholder="Enter the password"
          />
          <label for="add-user-role"
            >Role :
            <select name="role" id="add-user-role" required>
              <option value="client">Client</option>
              <option value="engineer">Engineer</option>
              <option value="admin">Admin</option>
            </select></label
          >

          <button type="submit">Add user</button>
          <button onclick="removeForm()" id="cancel-btn">Cancel</button>
        </form>
      </div>
    </main>
  </body>
</html>
